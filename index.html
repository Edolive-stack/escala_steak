<style>
:root{--brand:#1A1A2E;--gold:#C9A84C;--light:#F5F3EF;--gray:#888780;--dark:#2C2C2A;--folga-bg:#E8E6DF;--dsr-color:#0F6E56;--dobra-bg:#FCEBEB;--dobra-color:#A32D2D;--ferias-color:#888780;}

.header{background:var(--brand);color:#fff;padding:1rem 1rem .85rem;position:sticky;top:0;z-index:50;}

.wt-btn.active{background:var(--gold);color:var(--brand)}
.scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:.6rem;}
table{border-collapse:collapse;width:100%;min-width:780px;background:#fff;}
th,td{border:1px solid #ddd;padding:7px 6px;text-align:center;white-space:nowrap;font-size:11.5px;}
.col-name{text-align:left;font-weight:700;min-width:120px;position:sticky;left:0;background:#fff;z-index:2;}
thead th{background:var(--brand);color:#fff;font-size:10.5px;font-weight:700;position:sticky;top:0;z-index:3;}
thead th.col-name{z-index:4;background:var(--brand);}
thead .dow{display:block;font-size:10px}
thead .ddate{display:block;font-size:9.5px;color:var(--gold);font-weight:500}
.sector-row td{background:var(--brand);color:#fff;font-weight:700;text-align:left;font-size:11px;letter-spacing:.03em;padding:6px 6px;}
tr.row-even td.col-name,tr.row-even td.cell-work{background:#fafaf8}
td.cell-folga{background:var(--folga-bg);color:var(--gray);font-weight:600}
td.cell-dsr{background:#EAF3DE;color:var(--dsr-color);font-weight:700}
td.cell-dobra{background:var(--dobra-bg);color:var(--dobra-color);font-weight:600;font-size:10.5px}
td.cell-ferias{background:#F0EEE9;color:var(--ferias-color);font-weight:700}
td.cell-work{color:var(--dark)}
.legend{display:flex;flex-wrap:wrap;gap:10px;background:#fff;border-radius:10px;padding:9px 12px;margin:0 .6rem 1rem;font-size:11px;color:var(--gray);}
.legend span{display:flex;align-items:center;gap:5px}
.lg-box{width:11px;height:11px;border-radius:2px;flex-shrink:0}
</style>

const dowAbbr = ["DOM","SEG","TER","QUA","QUI","SEX","SÁB"];
function dowOf(s){return new Date(s+'T00:00:00').getDay();}
function fmtDate(s){const[y,m,d]=s.split('-');return `${d}/${m}`;}
const weekRanges=[[0,5],[5,12],[12,19],[19,26],[26,31]];
const setorOrder=["Cozinha","Salão","Caixa","ADM"];
const setorLabel={Cozinha:"COZINHA",Salão:"GARÇOM",Caixa:"CAIXA",ADM:"ADM"};
let currentWeek=0;
function cellClass(s){if(s==='folga')return'cell-folga';if(s==='dsr')return'cell-dsr';if(s==='dobra')return'cell-dobra';if(s==='ferias')return'cell-ferias';return'cell-work';}
function renderTable(){
  const[start,end]=weekRanges[currentWeek];
  const diasSemana=ESCALA.dias.slice(start,end);
  let html='<thead><tr><th class="col-name">Colaborador</th>';
  diasSemana.forEach(d=>{html+=`<th><span class="dow">${dowAbbr[dowOf(d.data)]}</span><span class="ddate">${fmtDate(d.data)}</span></th>`;});
  html+='</tr></thead><tbody>';
  setorOrder.forEach(setor=>{
    const colabs=Object.entries(ESCALA.colaboradores).filter(([n,i])=>i.setor===setor);
    if(colabs.length===0)return;
    html+=`<tr class="sector-row"><td colspan="${diasSemana.length+1}">${setorLabel[setor]}</td></tr>`;
    colabs.forEach(([nome,info],i)=>{
      html+=`<tr class="${i%2===1?'row-even':''}"><td class="col-name">${nome}</td>`;
      diasSemana.forEach((d,idx)=>{
        const gi=start+idx;const st=info.status[gi];
        html+=`<td class="${cellClass(st.status)}">${st.label}</td>`;
      });
      html+='</tr>';
    });
  });
  html+='</tbody>';
  document.getElementById('escalaTable').innerHTML=html;
}
document.getElementById('weekTabs').addEventListener('click',e=>{
  const b=e.target.closest('.wt-btn');if(!b)return;
  document.querySelectorAll('.wt-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');currentWeek=parseInt(b.dataset.week);renderTable();
});
renderTable();
